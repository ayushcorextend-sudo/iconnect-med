<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>iConnect — Medical Education Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root {
  --blue:#2563EB;--blue-d:#1D4ED8;--blue-l:#EFF6FF;--blue-ll:#DBEAFE;
  --teal:#2563EB;--teal-d:#1D4ED8;--teal-l:#EFF6FF;--teal-ll:#DBEAFE;
  --navy:#111827;--navy-m:#1F2937;--navy-l:#374151;
  --amber:#F59E0B;--amber-l:#FFFBEB;--amber-d:#92400E;
  --rose:#EF4444;--rose-l:#FEF2F2;--rose-d:#991B1B;
  --violet:#7C3AED;--violet-l:#F5F3FF;--violet-d:#5B21B6;
  --sky:#0EA5E9;--sky-l:#F0F9FF;
  --surf:#F9FAFB;--surf2:#F3F4F6;
  --white:#FFFFFF;--text:#111827;--muted:#6B7280;--light:#9CA3AF;--border:#E5E7EB;
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -1px rgba(0,0,0,.06);
  --shadow-lg:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -2px rgba(0,0,0,.05);
  --r:8px;--r-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--white);color:var(--text);min-height:100vh;}
h1,h2,h3,h4,h5{font-family:'Inter',system-ui,sans-serif;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
@keyframes slideR{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bounceIn{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.fu{animation:fadeUp .3s ease both;}
.fi{animation:fadeIn .25s ease both;}
.si{animation:scaleIn .25s ease both;}

/* LOGIN - matching screenshot style */
.login-bg{min-height:100vh;background:var(--white);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.login-logo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:32px;}
.logo-icon{width:56px;height:56px;border-radius:12px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:white;margin-bottom:12px;}
.logo-text{font-size:22px;font-weight:700;color:var(--text);}
.logo-sub{font-size:13px;color:var(--muted);margin-top:2px;}
.login-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:32px;width:420px;box-shadow:var(--shadow-md);}
.login-card h2{font-size:18px;font-weight:600;margin-bottom:4px;}
.login-card p{font-size:14px;color:var(--muted);margin-bottom:20px;}
.login-field{margin-bottom:14px;}
.login-field label{display:block;font-size:13px;font-weight:500;margin-bottom:5px;color:var(--text);}
.login-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;}
.login-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.login-btn{width:100%;padding:10px;background:var(--blue);color:white;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;}
.login-btn:hover{background:var(--blue-d);}
.login-divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--muted);font-size:13px;}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.admin-btn{width:100%;padding:9px;background:var(--white);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;margin-bottom:8px;text-align:center;}
.admin-btn:hover{background:var(--surf);border-color:var(--blue);}
.login-note{background:var(--blue-l);border:1px solid var(--blue-ll);border-radius:6px;padding:10px 14px;font-size:13px;color:#1E40AF;margin-top:14px;display:flex;align-items:flex-start;gap:8px;}

/* SHELL */
.shell{display:flex;min-height:100vh;}
.sidebar{width:240px;min-height:100vh;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;}
.sb-header{padding:16px;border-bottom:1px solid var(--border);}
.sb-logo{display:flex;align-items:center;gap:8px;}
.sb-logo-icon{width:32px;height:32px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:white;}
.sb-logo-text{font-size:17px;font-weight:700;color:var(--text);}
.sb-panel-label{font-size:11px;color:var(--muted);margin-top:1px;}
.sb-nav{flex:1;padding:8px;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:400;color:var(--muted);transition:all .15s;margin-bottom:1px;}
.nav-item:hover{background:var(--surf);color:var(--text);}
.nav-item.act{background:var(--blue-l);color:var(--blue);font-weight:500;}
.nav-ic{font-size:16px;width:20px;text-align:center;opacity:.7;}
.nav-item.act .nav-ic{opacity:1;}
.nav-bdg{margin-left:auto;background:var(--rose);color:white;font-size:10px;font-weight:700;border-radius:99px;padding:1px 6px;}
.sb-footer{padding:12px;border-top:1px solid var(--border);}
.logout-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:4px 8px;transition:color .15s;display:flex;align-items:center;gap:5px;}
.logout-btn:hover{color:var(--rose);}

/* MAIN */
.main{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh;background:var(--surf);}
.topbar{height:56px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50;}
.topbar-left{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);}
.topbar-left span{color:var(--muted);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.role-badge{background:transparent;border:1px solid var(--blue);color:var(--blue);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500;}
.icon-btn{width:36px;height:36px;border-radius:6px;border:1px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:16px;position:relative;}
.icon-btn:hover{background:var(--surf);}
.notif-count{position:absolute;top:-4px;right:-4px;background:var(--rose);color:white;font-size:9px;font-weight:700;border-radius:99px;padding:1px 5px;min-width:16px;text-align:center;border:2px solid white;}

/* PAGE */
.page{flex:1;padding:24px;animation:fadeUp .3s ease both;}
.ph{margin-bottom:20px;}
.pt{font-size:22px;font-weight:600;}
.ps{font-size:13px;color:var(--muted);margin-top:2px;}
.ph-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;}

/* CARDS */
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);padding:20px;}
.card-sm{padding:14px;}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.ct{font-size:14px;font-weight:600;color:var(--text);}
.cs{font-size:12px;color:var(--muted);margin-top:2px;}

/* STATS */
.sg4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.sg3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
.stat{background:var(--white);border-radius:var(--r);border:1px solid var(--border);padding:18px;position:relative;overflow:hidden;animation:fadeUp .3s ease both;}
.stat::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 var(--r) var(--r);}
.stat.teal::after{background:#22C55E;}
.stat.amber::after{background:var(--amber);}
.stat.rose::after{background:var(--rose);}
.stat.violet::after{background:var(--violet);}
.stat.sky::after{background:var(--blue);}
.stat-ic{font-size:22px;margin-bottom:8px;}
.stat-v{font-size:26px;font-weight:700;line-height:1;color:var(--text);}
.stat-l{font-size:12px;color:var(--muted);margin-top:4px;font-weight:400;}
.stat-ch{font-size:11px;font-weight:600;margin-top:8px;display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:99px;}
.up{background:#DCFCE7;color:#166534;}
.dn{background:var(--rose-l);color:var(--rose-d);}
.ntr{background:var(--surf2);color:var(--muted);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid transparent;font-family:inherit;white-space:nowrap;}
.btn-p{background:var(--blue);color:white;border-color:var(--blue);}
.btn-p:hover{background:var(--blue-d);}
.btn-s{background:var(--white);color:var(--text);border-color:var(--border);}
.btn-s:hover{background:var(--surf);}
.btn-d{background:var(--rose-l);color:var(--rose-d);border-color:#FECACA;}
.btn-d:hover{background:#FEE2E2;}
.btn-v{background:var(--violet-l);color:var(--violet-d);border-color:#DDD6FE;}
.btn-v:hover{background:#EDE9FE;}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:5px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}

/* TABLE */
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead th{text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;background:var(--surf);border-bottom:1px solid var(--border);}
tbody td{padding:12px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;}
tbody tr:hover{background:var(--surf);}
tbody tr:last-child td{border-bottom:none;}

/* BADGE */
.bdg{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;}
.bg-g{background:#DCFCE7;color:#166534;}
.bg-a{background:#FEF3C7;color:#92400E;}
.bg-r{background:var(--rose-l);color:var(--rose-d);}
.bg-v{background:var(--violet-l);color:var(--violet-d);}
.bg-s{background:var(--surf2);color:var(--muted);}
.bg-sky{background:var(--blue-l);color:#1D4ED8;}

/* FORM */
.fg{margin-bottom:14px;}
.fl{font-size:13px;font-weight:500;color:var(--text);margin-bottom:5px;display:block;}
.fl span.req{color:var(--rose);}
.fi-in,.fi-sel,.fi-ta{width:100%;padding:9px 12px;border-radius:6px;border:1px solid var(--border);background:var(--white);font-size:14px;color:var(--text);font-family:inherit;transition:border-color .15s;outline:none;}
.fi-in:focus,.fi-sel:focus,.fi-ta:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.fi-in.auto{background:var(--blue-l);border-color:var(--blue-ll);color:var(--blue-d);font-weight:500;}
.fi-ta{resize:vertical;min-height:80px;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.form-note{font-size:11px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:4px;}

/* UPLOAD */
.upz{border:2px dashed var(--border);border-radius:var(--r);padding:36px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surf);}
.upz:hover,.upz.drag{border-color:var(--blue);background:var(--blue-l);}
.pb{height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:10px;}
.pf{height:100%;background:var(--blue);border-radius:99px;transition:width .25s ease;}

/* MODAL */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease;}
.modal{background:var(--white);border-radius:10px;box-shadow:var(--shadow-lg);width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;animation:scaleIn .2s ease both;}
.modal-lg{width:700px;}
.mh{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between;}
.mt{font-size:16px;font-weight:600;}
.mc{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted);transition:all .15s;}
.mc:hover{background:var(--surf);}
.mb{padding:16px 24px;}
.mf{padding:0 24px 20px;display:flex;gap:8px;justify-content:flex-end;}

/* LB */
.lb-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:6px;margin-bottom:4px;transition:background .15s;}
.lb-row:hover{background:var(--surf);}
.lb-row.me{background:var(--blue-l);border:1px solid var(--blue-ll);}
.lb-pos{font-size:13px;font-weight:700;width:22px;color:var(--muted);}

/* NOTIF */
.ni{display:flex;gap:12px;padding:12px 14px;border-radius:6px;margin-bottom:4px;transition:background .15s;cursor:pointer;position:relative;}
.ni:hover{background:var(--surf);}
.ni.unr{background:var(--blue-l);}
.ni-ic{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.ni-t{font-size:13px;font-weight:500;}
.ni-b{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4;}
.ni-time{font-size:11px;color:var(--light);margin-top:3px;}

/* CAL */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cd{height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;transition:all .15s;}
.cd.empty{background:var(--surf2);color:var(--light);}
.cd.act{background:#22C55E;color:white;font-weight:600;}
.cd.event{background:var(--violet-l);color:var(--violet-d);}
.cd.target{background:#FEF3C7;color:#92400E;}
.cd.today{background:var(--blue);color:white;font-weight:700;}
.cd:hover{opacity:.8;}

/* PDF VIEWER */
.pdf-v{background:#525659;border-radius:var(--r);overflow:hidden;min-height:480px;display:flex;flex-direction:column;}
.pdf-tb{background:#3C3F41;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.pdf-btn{background:rgba(255,255,255,.1);border:none;border-radius:6px;color:rgba(255,255,255,.8);padding:5px 12px;cursor:pointer;font-size:12px;font-weight:600;transition:background .15s;}
.pdf-btn:hover{background:rgba(255,255,255,.2);}
.pdf-btn:disabled{opacity:.35;cursor:default;}
.pdf-page-area{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;}
.pdf-page{background:white;border-radius:4px;box-shadow:0 4px 20px rgba(0,0,0,.4);padding:40px;max-width:500px;width:100%;line-height:1.7;color:#222;}
.pdf-page h2{font-size:17px;font-weight:700;margin-bottom:14px;color:var(--navy);border-bottom:2px solid var(--blue);padding-bottom:8px;}

/* EBOOK GRID */
.eg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;}
.ec{background:var(--white);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;}
.ec:hover{box-shadow:var(--shadow-md);border-color:var(--blue);}
.ec-cover{height:110px;display:flex;align-items:center;justify-content:center;font-size:44px;position:relative;background:var(--surf);}
.ec-body{padding:10px;flex:1;}
.ec-title{font-size:12px;font-weight:600;line-height:1.3;margin-bottom:4px;}
.ec-meta{font-size:11px;color:var(--muted);}
.ec-foot{padding:8px 10px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}

/* PROFILE HERO */
.prof-hero{background:linear-gradient(135deg,var(--navy),var(--navy-m));border-radius:var(--r);padding:24px;color:white;display:flex;align-items:center;gap:18px;margin-bottom:20px;}
.prof-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:500;color:rgba(255,255,255,.8);margin-top:6px;}
.verify-pend{background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.3);color:#FCD34D;}

/* TOAST */
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:6px;}
.toast{background:var(--navy);color:white;border-radius:8px;padding:10px 14px;font-size:13px;font-weight:400;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:8px;animation:fadeIn .25s ease both;max-width:300px;}
.toast.s{border-left:3px solid #22C55E;}
.toast.e{border-left:3px solid var(--rose);}
.toast.i{border-left:3px solid var(--blue);}
.toast.w{border-left:3px solid var(--amber);}

/* TABS - underline style like screenshots */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px;}
.tab{padding:8px 16px;font-size:14px;font-weight:400;cursor:pointer;transition:all .15s;color:var(--muted);border:none;background:transparent;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px;}
.tab.act{color:var(--blue);border-bottom-color:var(--blue);font-weight:500;}
.tab:hover:not(.act){color:var(--text);}

/* MISC */
.divider{height:1px;background:var(--border);margin:16px 0;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.mt2{margin-top:8px;} .mt3{margin-top:12px;} .mt4{margin-top:16px;} .mt6{margin-top:20px;}
.mb3{margin-bottom:12px;}
.search-bar{display:flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--border);border-radius:6px;padding:7px 12px;transition:border-color .15s;}
.search-bar:focus-within{border-color:var(--blue);}
.search-bar input{border:none;background:transparent;outline:none;font-size:13px;color:var(--text);width:180px;font-family:inherit;}
.empty{text-align:center;padding:48px 20px;}
.empty-ic{font-size:44px;margin-bottom:12px;opacity:.5;}
.empty-t{font-size:16px;font-weight:600;margin-bottom:4px;}
.empty-s{font-size:13px;color:var(--muted);}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:11.5px;font-weight:500;background:var(--surf2);color:var(--muted);margin:3px;}
.tag-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.coming-soon-banner{background:var(--navy);border-radius:var(--r);padding:20px;color:white;text-align:center;margin-bottom:16px;}

/* KAHOOT */
.kahoot-card{background:linear-gradient(135deg,#46178F,#8B5CF6);border-radius:var(--r);padding:24px;color:white;position:relative;overflow:hidden;}

/* CHANNEL TOGGLES */
.ch-toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.toggle{width:38px;height:20px;border-radius:99px;cursor:pointer;transition:background .2s;display:flex;align-items:center;padding:0 3px;flex-shrink:0;}
.toggle.on{background:var(--blue);}
.toggle.off{background:var(--border);}
.toggle-thumb{width:14px;height:14px;border-radius:50%;background:white;transition:margin .2s;}
.toggle.on .toggle-thumb{margin-left:auto;}

/* SCORE BREAKDOWN */
.score-seg{height:8px;border-radius:99px;overflow:hidden;display:flex;gap:2px;margin:8px 0;}
.seg-part{height:100%;transition:width .5s ease;}

/* VERIFICATION STEPS */
.vstep{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.vstep-ic{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.vstep.done .vstep-ic{background:#DCFCE7;color:#166534;}
.vstep.pend .vstep-ic{background:#FEF3C7;color:#92400E;}
.vstep.miss .vstep-ic{background:var(--rose-l);color:var(--rose-d);}
</style>

function UploadPage({onUpload,addToast}){
  const [drag,setDrag]=useState(false);
  const [file,setFile]=useState(null);
  const [prog,setProg]=useState(0);
  const [uploading,setUploading]=useState(false);
  const [done,setDone]=useState(false);
  const [form,setForm]=useState({title:'',subject:'',program:'',access:'all',description:''});
  const ref=useRef();
  const subjects=Object.values(SPECIALITIES).flat();
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const handleFile=f=>{if(!f)return;if(f.type!=='application/pdf'){addToast('error','Only PDF files allowed.');return;}setFile(f);if(!form.title)set('title',f.name.replace('.pdf',''));};
  const submit=()=>{
    if(!file){addToast('error','Please select a PDF.');return;}
    if(!form.title.trim()||!form.subject){addToast('error','Title and subject are required.');return;}
    setUploading(true);let p=0;
    const iv=setInterval(()=>{p+=Math.random()*15+6;if(p>=100){p=100;clearInterval(iv);setUploading(false);setDone(true);
      onUpload({id:Date.now(),title:form.title,subject:form.subject,type:'PDF',size:(file.size/(1024*1024)).toFixed(1)+' MB',uploadedBy:'Priya Sharma',date:new Date().toISOString().split('T')[0],status:'pending',downloads:0,pages:Math.floor(Math.random()*500+100),emoji:['📗','📘','📙','📕'][Math.floor(Math.random()*4)],access:form.access,description:form.description,file});
      addToast('success',`"${form.title}" submitted for approval!`);
    }else setProg(Math.round(p));},120);
  };
  const reset=()=>{setFile(null);setProg(0);setDone(false);setForm({title:'',subject:'',program:'',access:'all',description:''}); };

    <div className="ph"><div className="pt">Upload E-Book</div><div className="ps">PDF will be reviewed by Super Admin before publishing. Users can see the card as "Pending Verification" in the meantime.</div></div>
    <div style={{maxWidth:680}}>
      {!done?<div className="card">
// ✅ CORRECT: Merged into one
<div 
  style={{ marginBottom: 16 }} 
  className={`upz ${drag ? 'drag' : ''}`} 
  onDragOver={e => { e.preventDefault(); setDrag(true); }} 
  onDragLeave={() => setDrag(false)} 
  onDrop={e => { e.preventDefault(); setDrag(false); handleFile(e.dataTransfer.files[0]); }} 
  onClick={() => !file && ref.current.click()}
>          <input ref={ref} type="file" accept=".pdf" style={{display:'none'}} onChange={e=>handleFile(e.target.files[0])}/>
          {file?<div><div style={{fontSize:36}}>📄</div><div style={{fontWeight:600,marginTop:8}}>{file.name}</div><div style={{fontSize:12,color:'#6B7280'}}>{(file.size/(1024*1024)).toFixed(2)} MB</div>

            {uploading&&<div className="pb" style={{marginTop:12}}><div className="pf" style={{width:`${prog}%`}}/></div>}

        </div>
        <div className="fg"><label className="fl">Document Title <span className="req">*</span></label><input className="fi-in" placeholder="e.g. Harrison's Principles of Internal Medicine" value={form.title} onChange={e=>set('title',e.target.value)}/></div>
        <div className="fg2">

            <div key={k} className="ch-toggle">

// ── REGISTRATION (Feature #3, #6, #7) ──
function RegistrationPage({addToast,setPage}){
  const now=new Date().getFullYear();
  const [step,setStep]=useState(1);
  const [form,setForm]=useState({name:'',email:'',phone:'',program:'MD',speciality:'',college:'',joining:2024,hometown:'',homeState:'',neetRank:'',address:''});
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const duration=PROG_YEARS[form.program]||3;
  const completion=form.joining?parseInt(form.joining)+duration:'—';
  const curYr=form.joining?now-parseInt(form.joining)+1:null;
  const curYrLabel=!curYr?'—':curYr<=0?'Not started':curYr===1?'1st Year':curYr===2?'2nd Year':curYr===3?'3rd Year':'Completed';
  const zone=getZone(form.homeState);
  const nextStep=()=>{
    if(step===1&&(!form.name||!form.phone||!form.email)){addToast('error','All personal details are mandatory.');return;}
    if(step===2&&(!form.program||!form.speciality||!form.college||!form.joining)){addToast('error','All academic fields are mandatory.');return;}
    if(step===3&&(!form.hometown||!form.homeState)){addToast('error','Hometown and Home State are mandatory.');return;}
    setStep(s=>s+1);
  };
  const submit=()=>{addToast('success','Registration submitted! Profile verification will begin after all details are reviewed.');setPage('dashboard');};
  const steps=['Personal','Academic','Location','Review'];
  return <div className="page">
    <div className="ph"><div className="pt">📋 New Registration</div><div className="ps">PG Aspirant Onboarding — All fields marked * are mandatory</div></div>
    {/* Progress */}
    <div style={{display:'flex',gap:8,marginBottom:24,alignItems:'center'}}>
      {steps.map((s,i)=><React.Fragment key={s}>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <div style={{width:28,height:28,borderRadius:'50%',background:i+1<=step?'#2563EB':'#F9FAFB',color:i+1<=step?'#111827':'#6B7280',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Inter,sans-serif',fontWeight:700,fontSize:12,transition:'all .2s'}}>{i+1<step?'✓':i+1}</div>
          <span style={{fontSize:12,fontWeight:600,color:i+1===step?'#111827':'#6B7280'}}>{s}</span>
        </div>
        {i<steps.length-1&&<div style={{flex:1,height:2,background:i+1<step?'#2563EB':'#E5E7EB',borderRadius:99,transition:'background .3s'}}/>}
      </React.Fragment>)}
    </div>
    <div style={{maxWidth:640}}>
      {step===1&&<div className="card fi">
        <div className="ct" style={{marginBottom:16}}>👤 Personal Details</div>
        <div className="fg"><label className="fl">Full Name (with title) <span className="req">*</span></label><input className="fi-in" placeholder="Dr. First Last" value={form.name} onChange={e=>set('name',e.target.value)}/></div>
        <div className="fg2">
          <div className="fg"><label className="fl">Email Address <span className="req">*</span></label><input className="fi-in" type="email" placeholder="you@hospital.in" value={form.email} onChange={e=>set('email',e.target.value)}/></div>
          <div className="fg"><label className="fl">Phone Number <span className="req">*</span></label><input className="fi-in" placeholder="+91 98765 43210" value={form.phone} onChange={e=>set('phone',e.target.value)}/></div>
        </div>
        <div className="fg"><label className="fl">NEET-PG All India Rank</label><input className="fi-in" type="number" placeholder="e.g. 142" value={form.neetRank} onChange={e=>set('neetRank',e.target.value)}/></div>
      </div>}
      {step===2&&<div className="card fi">
        <div className="ct" style={{marginBottom:16}}>🎓 Academic Details</div>
        <div className="fg2">
          <div className="fg"><label className="fl">Program Type <span className="req">*</span></label>
            <select className="fi-sel" value={form.program} onChange={e=>{set('program',e.target.value);set('speciality','');}}>
              {Object.keys(SPECIALITIES).map(p=><option key={p} value={p}>{p}</option>)}
            </select>
          </div>
          <div className="fg"><label className="fl">Speciality <span className="req">*</span></label>
            <select className="fi-sel" value={form.speciality} onChange={e=>set('speciality',e.target.value)}>
              <option value="">Select…</option>
              {(SPECIALITIES[form.program]||[]).map(s=><option key={s} value={s}>{s}</option>)}
            </select>
          </div>
        </div>
        <div className="fg"><label className="fl">College / Institution <span className="req">*</span></label><input className="fi-in" placeholder="e.g. AIIMS Delhi" value={form.college} onChange={e=>set('college',e.target.value)}/></div>
        <div className="fg"><label className="fl">Year of Joining <span className="req">*</span></label>
          <select className="fi-sel" value={form.joining} onChange={e=>set('joining',parseInt(e.target.value))}>
            {[2019,2020,2021,2022,2023,2024,2025].map(y=><option key={y} value={y}>{y}</option>)}
          </select>
        </div>
        {/* Feature #3: auto fields */}
        <div style={{background:'#EFF6FF',borderRadius:12,padding:'14px',marginTop:4}}>
          <div style={{fontSize:12,fontWeight:700,color:'#1D4ED8',marginBottom:8}}>✨ Auto-calculated from Year of Joining</div>
          <div className="fg2" style={{gap:10}}>
            <div><label className="fl">Current Academic Year</label><input className="fi-in auto" value={curYrLabel} readOnly/></div>
            <div><label className="fl">Expected Completion</label><input className="fi-in auto" value={completion} readOnly/></div>
          </div>
          <div style={{fontSize:11,color:'#1D4ED8',marginTop:4}}>📅 {form.program} duration: {duration} years · Access expires: {completion!=='—'?parseInt(completion)+2:'—'}</div>
        </div>
      </div>}
      {step===3&&<div className="card fi">
        <div className="ct" style={{marginBottom:4}}>📍 Location Details</div>
        <div style={{fontSize:12,color:'#6B7280',marginBottom:14}}>Hometown and Home State are mandatory for zone allocation and regional reporting.</div>
        <div className="fg2">
          <div className="fg"><label className="fl">Hometown <span className="req">*</span></label><input className="fi-in" placeholder="City / Town" value={form.hometown} onChange={e=>set('hometown',e.target.value)}/></div>
          <div className="fg"><label className="fl">Home State <span className="req">*</span></label>
            <select className="fi-sel" value={form.homeState} onChange={e=>set('homeState',e.target.value)}>
              <option value="">Select state…</option>
              {STATES.map(s=><option key={s} value={s}>{s}</option>)}
            </select>
          </div>
        </div>
        {form.homeState&&<div style={{background:'#EFF6FF',borderRadius:10,padding:'10px 14px',fontSize:12,color:'#1D4ED8',marginBottom:12}}>✨ Zone auto-assigned: <strong>{getZone(form.homeState)}</strong></div>}
        <div className="fg"><label className="fl">Current Address (optional)</label><textarea className="fi-ta" placeholder="Optional — Current city / hospital address" value={form.address} onChange={e=>set('address',e.target.value)}/></div>
        <div style={{background:'#FFFBEB',borderRadius:10,padding:'10px 14px',fontSize:12,color:'#92400E'}}>⏰ <strong>Access Policy:</strong> Platform access is available for 2 years after your passing out year ({completion}). Access will expire in {completion!=='—'?parseInt(completion)+2:'N/A'}.</div>
      </div>}
      {step===4&&<div className="card fi">
        <div className="ct" style={{marginBottom:14}}>📋 Review & Submit</div>
        {[['Name',form.name],['Email',form.email],['Phone',form.phone],['Program',form.program],['Speciality',form.speciality],['College',form.college],['Year of Joining',form.joining],['Current Year',curYrLabel],['Expected Completion',completion],['Hometown',form.hometown],['Home State',form.homeState],['Zone',zone]].map(([l,v])=>
          <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid #F9FAFB'}}>
            <span style={{fontSize:13,color:'#6B7280'}}>{l}</span><span style={{fontSize:13,fontWeight:600}}>{v||'—'}</span>
          </div>
        )}
        <div style={{marginTop:14,background:'#F9FAFB',borderRadius:10,padding:'12px',fontSize:12,color:'#6B7280'}}>By submitting, you agree that profile verification will begin only after all details are reviewed by the Admin. You will be notified once verified.</div>
      </div>}
      <div style={{display:'flex',gap:10,justifyContent:'space-between',marginTop:16}}>
        {step>1?<button className="btn btn-s" onClick={()=>setStep(s=>s-1)}>← Back</button>:<div/>}
        {step<4?<button className="btn btn-p" onClick={nextStep}>Continue →</button>:<button className="btn btn-p" onClick={submit}>Submit Registration ✓</button>}
      </div>
    </div>
  </div>;
}

      {features.map((f,i)=><div key={i} className="card" style={{opacity:.7}}>

        <div style={{fontFamily:'Inter,sans-serif',fontWeight:700,fontSize:14,marginBottom:4}}>{f.t}</div>
        <div style={{fontSize:12,color:'#6B7280'}}>{f.d}</div>
        <div style={{marginTop:10}}><span className="bdg bg-a">Placeholder</span></div>
      </div>)}
    </div>
  </div>;
}

// ── KAHOOT PAGE (Feature #11) ──

    <div className="ph"><div className="pt">🎮 Kahoot Quiz Integration</div><div className="ps">Interactive live quizzes — coming soon</div></div>
    <div className="kahoot-card" style={{marginBottom:20}}>
      <div style={{fontSize:48,marginBottom:12}}>🎮</div>
      <div style={{fontFamily:'Inter,sans-serif',fontSize:22,fontWeight:800,marginBottom:8}}>Kahoot! Live Quizzes</div>
      <div style={{fontSize:14,color:'rgba(255,255,255,.6)',marginBottom:16,maxWidth:480}}>Real-time competitive quizzes for PG aspirants. Answer NEET-PG MCQs live with your batchmates and see where you rank instantly.</div>
      <button style={{background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.3)',borderRadius:10,color:'white',padding:'10px 20px',fontSize:13,fontWeight:600,cursor:'pointer'}}>🚧 Coming in Version 3</button>
    </div>
    <div className="grid3">
      {[{i:'🏆',t:'Live Competitions',d:'Real-time quiz battles with peers in your speciality'},{i:'📊',t:'Instant Results',d:'See your score and rank the moment the quiz ends'},{i:'📚',t:'Subject-wise Sets',d:'Curated NEET-PG question banks by subject'}].map((f,i)=><div key={i} className="card" style={{opacity:.75}}>
        <div style={{fontSize:28,marginBottom:8}}>{f.i}</div>
        <div style={{fontFamily:'Inter,sans-serif',fontWeight:700,fontSize:14,marginBottom:4}}>{f.t}</div>

// ── SETTINGS ──
function SettingsPage({addToast}){
  const [toggles,setT]=useState({autoApprove:false,welcomeMsg:true,digestEmail:true,leaderboardUpdates:false,reqVerify:true});
  const tog=k=>setT(p=>({...p,[k]:!p[k]}));
  return <div className="page">
    <div className="ph"><div className="pt">⚙️ Settings</div><div className="ps">Platform configuration and preferences</div></div>
    <div style={{maxWidth:640}}>
      {[{sec:'Content Settings',items:[['auto_approve','Auto-approve from trusted admins','autoApprove'],['file_size','Max PDF size (MB)',null,100],['access_years','Access duration (years)',null,2]]},{sec:'Notification Settings',items:[['welcome','Welcome message on registration','welcomeMsg'],['digest','Daily email digest','digestEmail'],['lb','Leaderboard update alerts','leaderboardUpdates']]},{sec:'Registration & Verification',items:[['req_verify','Require admin approval for verification','reqVerify'],['hometown','Mandate hometown & home state',null,true],['access_2yr','Enforce 2-year access policy',null,true]]}].map(({sec,items})=>
        <div key={sec} className="card" style={{marginBottom:16}}>
          <div className="ct" style={{marginBottom:14}}>{sec}</div>
          {items.map(([k,l,tog_k,val])=><div key={k} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid #F9FAFB'}}>
            <span style={{fontSize:13}}>{l}</span>
            {tog_k?<Toggle on={toggles[tog_k]} onChange={()=>tog(tog_k)}/>:<input className="fi-in" style={{width:80}} defaultValue={val}/>}
          </div>)}
        </div>
      )}
      <button className="btn btn-p" onClick={()=>addToast('success','Settings saved!')}>💾 Save Settings</button>
    </div>
  </div>;
}

// ── PAGE TITLES ──
const titles={dashboard:'🏠 Dashboard',ebooks:'📚 E-Book Library',upload:'⬆️ Upload E-Book',leaderboard:'🏆 My Leaderboard',activity:'📅 My Activity',notifications:'🔔 Notifications',profile:'👤 My Profile',users:'👥 User Management',reports:'📈 Reports',settings:'⚙️ Settings',registration:'📋 Registration',social:'👥 Social Features',groups:'🎯 Interest Groups',kahoot:'🎮 Kahoot Quiz'};

// ── ROOT APP ──
function App(){
  const [role,setRole]=useState(null);
  const [page,setPage]=useState('dashboard');
  const [artifacts,setArtifacts]=useState(ARTIFACTS_INIT);
  const [notifications,setNotifications]=useState(NOTIFS_INIT);
  const [toasts,setToasts]=useState([]);
  const [notifPanel,setNotifPanel]=useState(false);

  const addToast=useCallback((type,msg)=>{const id=Date.now();setToasts(t=>[...t,{id,type,msg}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);},[]);
  const onApprove=id=>setArtifacts(a=>a.map(x=>x.id===id?{...x,status:'approved'}:x));
  const onReject=id=>setArtifacts(a=>a.filter(x=>x.id!==id));
  const onUpload=art=>{setArtifacts(a=>[art,...a]);setNotifications(n=>[{id:Date.now(),type:'info',icon:'📤',unread:true,time:'Just now',title:'Upload Submitted',body:`"${art.title}" is pending Super Admin approval.`,channel:'in_app'},...n]);};

  const unreadCount=notifications.filter(n=>n.unread).length;
  const pendingCount=artifacts.filter(a=>a.status==='pending').length;

  // close notif panel on page change
  useEffect(()=>setNotifPanel(false),[page]);

  const login=r=>{setRole(r);setPage('dashboard');};
  const logout=()=>{setRole(null);setPage('dashboard');};

  if(!role)return <><Login onLogin={login}/><Toasts toasts={toasts}/></>;

  const commonProps={artifacts,setPage,addToast,notifications,setNotifications,role,onApprove,onReject,onUpload};

  const renderPage=()=>{
    switch(page){
      case 'dashboard':return role==='superadmin'?<SADashboard {...commonProps}/>:role==='contentadmin'?<CADashboard {...commonProps}/>:<DoctorDashboard {...commonProps}/>;
      case 'ebooks':return <EBooksPage {...commonProps}/>;
      case 'upload':return <UploadPage onUpload={onUpload} addToast={addToast}/>;
      case 'leaderboard':return <LeaderboardPage/>;
      case 'activity':return <ActivityPage/>;
      case 'notifications':return <NotificationsPage notifications={notifications} setNotifications={setNotifications} addToast={addToast}/>;
      case 'profile':return <ProfilePage addToast={addToast}/>;
      case 'users':return <UsersPage addToast={addToast}/>;
      case 'reports':return <ReportsPage addToast={addToast}/>;
      case 'settings':return <SettingsPage addToast={addToast}/>;
      case 'registration':return <RegistrationPage addToast={addToast} setPage={setPage}/>;
      case 'social':return <ComingSoonPage title="Social Features" icon="👥" desc="Connect with peers, share notes, follow top performers and build your medical network." features={[{i:'👫',t:'Peer Network',d:'Follow and connect with doctors from your speciality'},{i:'📝',t:'Note Sharing',d:'Share and discover study notes'},{i:'💬',t:'Chat Groups',d:'Private and group messaging'},{i:'🌟',t:'Verification Badge',d:'Blue tick for verified doctors (Facebook-style)'}]}/>;
      case 'groups':return <ComingSoonPage title="Interest Groups" icon="🎯" desc="Join or create groups based on speciality, college, or study topics." features={[{i:'🏥',t:'Speciality Groups',d:'MD, MS, DM groups for each subject'},{i:'📚',t:'Study Circles',d:'Small group study sessions'},{i:'📢',t:'Mass Communication',d:'Admin broadcast to all group members'},{i:'📱',t:'WhatsApp Business',d:'Group notifications via WhatsApp Business API'}]}/>;
      case 'kahoot':return <KahootPage/>;
      default:return <div className="page"><div className="empty"><div className="empty-ic">🚧</div><div className="empty-t">Coming Soon</div></div></div>;
    }
  };

  return <div className="shell" onClick={()=>setNotifPanel(false)}>
    <Sidebar role={role} page={page} setPage={setPage} onLogout={logout} pendingCount={pendingCount} unreadCount={unreadCount}/>
    <div className="main" onClick={e=>e.stopPropagation()}>
      <TopBar title={titles[page]||'iConnect'} role={role} unreadCount={unreadCount} setPage={setPage} notifPanelOpen={notifPanel} setNotifPanel={setNotifPanel} notifications={notifications}/>
      {renderPage()}
    </div>
    <Toasts toasts={toasts}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
